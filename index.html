<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />

    <title>С Днём Рождения, мамочка ❤️</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <canvas id="stars"></canvas>

    <main class="container">
      <section class="card">
        <h1>С Днём Рождения, мамочка ❤️</h1>

        <p class="subtitle">Сообщения от твоей семьи</p>

        <div id="intro-text" class="intro-text hidden">
          Мама, это небольшое поздравление для тебя ❤️
        </div>

        <div id="family-container" class="family-grid"></div>

        <button id="open-video-btn" class="video-button hidden">
          Посмотреть видео сделанное для тебя 🎥
        </button>
      </section>
    </main>

    <div id="video-modal" class="video-modal hidden">
      <div id="video-backdrop" class="video-backdrop"></div>

      <div class="video-dialog">
        <button id="close-video-btn" class="close-button">×</button>

        <h2 class="video-title">Небольшое видео ❤️</h2>

        <video id="birthday-video" class="popup-video" controls playsinline>
          <source src="assets/video/IMG_0235.MOV" type="video/quicktime" />
        </video>
      </div>
    </div>

    <script src="js/stars.js"></script>
    <script src="js/main.js"></script>
    <script src="js/video-player.js"></script>
  </body>
</html>
